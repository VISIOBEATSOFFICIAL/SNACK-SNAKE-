<!DOCTYPE html>
<html>
<head>

<title>Snack Snake</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/833/833472.png">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
    color: white;
}

#bg {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 0;
}

.container {
    position: relative;
    z-index: 2;
    height: 100vh;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#title {
    font-size: 26px;
    margin-bottom: 8px;
    color: #00ffcc;
}

#ui {
    margin-bottom: 10px;
    font-size: 18px;
    padding: 10px 15px;
    border: 2px solid #00ffcc;
    border-radius: 10px;
    background: #111;
    width: 500px;
}

#bar {
    width: 100%;
    height: 10px;
    background: #222;
    margin-top: 8px;
    border-radius: 5px;
    overflow: hidden;
}

#fill {
    height: 100%;
    width: 0%;
    background: #00ffcc;
}

canvas {
    background: #111;
    border: 3px solid #00ffcc;
}

/* GAME OVER */
#menu, #donatePopup, #resetPopup {
    position: absolute;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.85);
    z-index: 10;
}

.box {
    background: #111;
    border: 2px solid #00ffcc;
    padding: 20px;
    text-align: center;
    border-radius: 12px;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    background: #00ffcc;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div id="title">🐍 Snack Snake</div>

<div id="ui">
🍎 Apples: <span id="score">0</span><br>
⭐ Level: <span id="level">1</span>

<div id="bar"><div id="fill"></div></div>
</div>

<canvas id="game" width="500" height="500"></canvas>

</div>

<!-- GAME OVER -->
<div id="menu">
<div class="box">
<h2>You Died 💀</h2>
<button onclick="location.reload()">Restart</button>
<button onclick="confirmReset()">Reset Save</button>
<button onclick="openDonate()">❤️ Support Dev</button>
</div>
</div>

<!-- DONATION -->
<div id="donatePopup">
<div class="box">
<h3>❤️ Like Snack Snake?</h3>
<p>Support the dev for $1</p>
<button onclick="openDonate()">Donate</button>
<button onclick="closeDonate()">Not now</button>
</div>
</div>

<!-- RESET CONFIRM -->
<div id="resetPopup">
<div class="box">
<h3>⚠️ Reset Save?</h3>
<p>This will delete all progress</p>
<button onclick="resetSave()">Yes Reset</button>
<button onclick="closeReset()">Cancel</button>
</div>
</div>

<script>

/* 🌠 BACKGROUND */
const bg=document.getElementById("bg");
const bctx=bg.getContext("2d");

bg.width=window.innerWidth;
bg.height=window.innerHeight;

let stars=[];
for(let i=0;i<80;i++){
stars.push({
x:Math.random()*bg.width,
y:Math.random()*bg.height,
r:Math.random()*2,
c:`hsl(${Math.random()*360},100%,70%)`,
s:Math.random()*2+0.5
});
}

function starsLoop(){
bctx.fillStyle="black";
bctx.fillRect(0,0,bg.width,bg.height);

for(let s of stars){
bctx.fillStyle=s.c;
bctx.beginPath();
bctx.arc(s.x,s.y,s.r,0,Math.PI*2);
bctx.fill();

s.y+=s.s;
if(s.y>bg.height){
s.y=0;
s.x=Math.random()*bg.width;
}
}

requestAnimationFrame(starsLoop);
}
starsLoop();

/* 🎮 GAME */
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const grid=20;
const size=canvas.width/grid;

let snake=[{x:10,y:10}];
let direction={x:1,y:0};
let apple=spawnApple();

let apples=0;
let level=1;
let gameOver=false;

let deathCount=0;

/* 💾 SAVE */
function load(){
let data=localStorage.getItem("snakeSave");
if(data){
let s=JSON.parse(data);
apples=s.apples;
level=s.level;
document.getElementById("score").textContent=apples;
document.getElementById("level").textContent=level;
}
}

function save(){
if(gameOver)return;
localStorage.setItem("snakeSave",JSON.stringify({apples,level}));
}

/* INPUT */
document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp"&&direction.y===0)direction={x:0,y:-1};
if(e.key==="ArrowDown"&&direction.y===0)direction={x:0,y:1};
if(e.key==="ArrowLeft"&&direction.x===0)direction={x:-1,y:0};
if(e.key==="ArrowRight"&&direction.x===0)direction={x:1,y:0};
});

/* 📱 SWIPE */
let sx=0,sy=0;
document.addEventListener("touchstart",e=>{
sx=e.touches[0].clientX;
sy=e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{
let dx=e.changedTouches[0].clientX-sx;
let dy=e.changedTouches[0].clientY-sy;

if(Math.abs(dx)>Math.abs(dy)){
if(dx>0&&direction.x===0)direction={x:1,y:0};
if(dx<0&&direction.x===0)direction={x:-1,y:0};
}else{
if(dy>0&&direction.y===0)direction={x:0,y:1};
if(dy<0&&direction.y===0)direction={x:0,y:-1};
}
});

/* 🍎 APPLE */
function spawnApple(){
return{
x:Math.floor(Math.random()*size),
y:Math.floor(Math.random()*size)
};
}

/* LOOP */
function loop(){
if(gameOver)return;

setTimeout(()=>{
update();
draw();
loop();
},90);
}

/* UPDATE */
function update(){
let head={x:snake[0].x+direction.x,y:snake[0].y+direction.y};

if(head.x<0||head.y<0||head.x>=size||head.y>=size)return end();

for(let p of snake){
if(p.x===head.x&&p.y===head.y)return end();
}

snake.unshift(head);

if(head.x===apple.x&&head.y===apple.y){
apples++;
apple=spawnApple();

level=Math.floor(apples/10)+1;

document.getElementById("score").textContent=apples;
document.getElementById("level").textContent=level;

save();
}else{
snake.pop();
}

document.getElementById("fill").style.width=(apples%10)*10+"%";
}

/* DRAW */
function draw(){
ctx.fillStyle="#111";
ctx.fillRect(0,0,500,500);

ctx.fillStyle="red";
ctx.fillRect(apple.x*grid,apple.y*grid,grid,grid);

for(let i=0;i<snake.length;i++){
let s=snake[i];
ctx.fillStyle="#00ffcc";
ctx.fillRect(s.x*grid,s.y*grid,grid,grid);

if(i===0){
ctx.fillStyle="white";
ctx.fillRect(s.x*grid+4,s.y*grid+4,3,3);
ctx.fillRect(s.x*grid+12,s.y*grid+4,3,3);
}
}
}

/* END */
function end(){
gameOver=true;
deathCount++;
save();
document.getElementById("menu").style.display="flex";

if(deathCount%5===0){
setTimeout(()=>document.getElementById("donatePopup").style.display="flex",500);
}
}

/* DONATE */
function openDonate(){
window.open("https://paypal.me/zkaterswrldd",1"_blank");
}

function closeDonate(){
document.getElementById("donatePopup").style.display="none";
}

/* RESET */
function confirmReset(){
document.getElementById("resetPopup").style.display="flex";
}

function closeReset(){
document.getElementById("resetPopup").style.display="none";
}

function resetSave(){
localStorage.removeItem("snakeSave");
location.reload();
}

/* START */
load();
loop();

</script>

</body>
</html>
